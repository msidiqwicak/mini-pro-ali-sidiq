version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-pro-sidiq-db
    environment:
      POSTGRES_USER: wzfxpzcpoopqmpaezpyy
      POSTGRES_PASSWORD: KAELkael12!
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - soundwave-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: mini-pro-sidiq-api
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - soundwave-network
    volumes:
      - ./backend/src:/app/src

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runtime
    container_name: mini-pro-sidiq-web
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - soundwave-network
    environment:
      VITE_API_URL: http://api:5000/api

volumes:
  postgres-data:

networks:
  soundwave-network:
    driver: bridge